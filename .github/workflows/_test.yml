name: Test (reusable)

# Single source of truth for the project's pre-merge / pre-publish checks:
# ruff lint + format + the pytest matrix against a real mosquitto. Called
# from ci.yml on push/PR and as a gate from release.yml + docker-publish.yml
# so a commit that fails any of these can't reach PyPI or Docker Hub.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install + start mosquitto
        # The e2e tests shell out to mosquitto_pub / mosquitto_sub and connect
        # PyBridgeServer to localhost:1883. Mosquitto >= 2.0 ships with
        # allow_anonymous defaulting to false, so we drop a CI-only config
        # that re-enables anonymous on the default port before starting it.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mosquitto mosquitto-clients
          sudo tee /etc/mosquitto/conf.d/ci.conf > /dev/null <<'EOF'
          listener 1883
          allow_anonymous true
          EOF
          sudo systemctl restart mosquitto
          # Wait for the broker to actually accept connections before tests
          # try to use it — systemd reports "active" before the listener is
          # ready under some kernel/seccomp combos.
          for _ in $(seq 1 20); do
            if mosquitto_sub -h localhost -t '$SYS/broker/version' -C 1 -W 2 >/dev/null 2>&1; then
              echo "mosquitto reachable"
              exit 0
            fi
            sleep 0.5
          done
          echo "mosquitto did not become reachable"
          sudo journalctl -u mosquitto --no-pager | tail -50
          exit 1

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        # Chromium only — keeps the install footprint to ~140MB. apt deps
        # are needed for the bundled chromium-headless-shell to launch on
        # the GitHub runner.
        run: python -m playwright install --with-deps chromium

      - name: ruff check
        run: ruff check src tests

      - name: ruff format --check
        run: ruff format --check src tests

      - name: pytest (unit + mqtt e2e)
        # The mqtt e2e suite is the slow one (~30s). Run it separately
        # from the UI smoke so a flaky browser test doesn't get blamed
        # on a backend regression and vice versa.
        run: pytest -q --ignore=tests/e2e_ui

      - name: pytest (ui smoke)
        # Browser-driven smoke. Boots uvicorn in-thread with a stub
        # BridgeClient, navigates Playwright through the page, asserts
        # against the rendered DOM.
        run: pytest -q tests/e2e_ui --browser chromium
