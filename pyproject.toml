[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rustuya-manager"
version = "0.4.13"
description = "Management tool for rustuya-bridge — keeps Tuya Cloud devices and the bridge in sync"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "paho-mqtt>=2.0",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pyrustuyabridge>=0.1.0,<0.2",
    "tuyawizard>=0.1.5",
    # tuya-sharing-sdk (transitively pulled by tuyawizard) imports cryptography
    # at runtime but doesn't list it in its own deps — declare it ourselves so
    # `pip install rustuya-manager` never fails with a hidden ImportError.
    "cryptography>=41",
    # tuyawizard's --postprocess scan stage enriches devices with IP/version
    # via UDP discovery; it's optional upstream but we want it by default.
    "rustuya>=0.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",  # FastAPI TestClient transitive
    "ruff>=0.6",
]

[project.scripts]
rustuya-manager = "rustuya_manager.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
rustuya_manager = ["templates/*.html", "static/*.js", "static/*.css"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["build", "dist"]

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, B = bugbear, UP = pyupgrade.
# Intentionally not enabling D (pydocstyle) or strict naming rules — the
# codebase favors concise prose over rigid docstring shapes, and the
# review-line cost of fighting those would outweigh the gain.
select = ["E", "F", "I", "W", "B", "UP"]
ignore = [
    "E501",  # line length is already capped via formatter; ignoring the
             # lint complement avoids noise on long string literals where
             # wrapping would hurt readability (commit messages, MQTT
             # topic templates with embedded {placeholders}, etc.).
    "B008",  # FastAPI relies on Depends()/Body() as default values — the
             # rule's "no function call in default" is a known false
             # positive for that pattern.
]

[tool.ruff.lint.isort]
known-first-party = ["rustuya_manager"]

[tool.ruff.format]
# Match the existing style of the codebase — double quotes are already
# dominant, no need to flip everything for the sake of one tool's defaults.
quote-style = "double"
