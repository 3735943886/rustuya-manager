[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rustuya-manager"
# Single source of truth: src/rustuya_manager/__init__.py:__version__. Bump it
# there only — this resolves it at build time, web.py reads it at runtime, and
# check.sh reads it from the installed package. See [tool.setuptools.dynamic].
dynamic = ["version"]
description = "Management tool for rustuya-bridge — keeps Tuya Cloud devices and the bridge in sync"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "aiomqtt>=2.0",
    "rich>=13.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pyrustuyabridge>=0.2.0rc25,<0.3",  # 0.2.0rc11 added the `reconfigure` self-terminate that _EmbeddedBridgeSupervisor (cli.py) drives. rc12–rc16 are bridge-side correctness fixes the manager benefits from: rc12 retained cleanup covers the whole fleet, rc13 fixes a cleanup deadlock + coalesced-removes gap, rc15 counts PubAcks instead of buffered writes, rc16 adds a liveness-probe singleton check so post-power-loss startup can't deadlock. rc17 makes multi-target commands (remove cascade, clear) reply per-id so the manager can act on each ack individually instead of guessing which devices the bridge wiped. rc18 moves the cache-mode retained snapshot from `{type}=passive` to `{type}=state` (passive becomes a no-retain delta); the manager wildcards `{type}` so no code change, but pinning rc18 keeps a mixed deployment from leaving orphan `passive` retained snapshots that briefly seed `retained_only` before the bridge's scavenger clears them. rc19 exposes `parse_seed_dps` so `_extract_dps_from_event` reads multi-DP event payloads (no `{dp}` in topic, bare DPS object — e.g. a `get` reply on `event/passive/{id}`) byte-identically to the bridge instead of dropping them; the manager now calls it, so this is a hard pin. rc20 bumps the core rustuya crate (bridge-internal). rc21 lifts rumqttc's 10KiB client packet cap and paginates the `status` reply so large fleets aren't truncated mid-device-list, and caps connection-establishment concurrency so a big fleet's startup storm can't overwhelm the bridge. rc22 adds background-task panic logging (diagnostic). rc23 fixes a Python-binding shutdown-time process abort — a tokio worker forwarding a log record to Python during interpreter finalization could force-terminate the process at the `panic=abort` boundary; since the manager drives the embedded bridge's `stop()`/`close()` (_EmbeddedBridgeSupervisor), pinning rc23 keeps an embedded-bridge shutdown from aborting the manager process. rc23 also pulls rustuya rc7's replay-latched-status fix so a late-attaching listener still gets a large fleet's straggler device states. rc24 fixes fleet-scale fan-out under QoS1: a name-addressed `set`/`get` or gateway cascade emitting hundreds of deltas+responses at once stalled the MQTT event loop (PUBACK round-trips + the in-flight window) and reset ~60% of a 500-device fleet's connections, so most responses were lost (~99/500 delivered). Live messages now publish at QoS0 (retained state stays QoS1) and the publish loop uses non-blocking try_publish; fan-out also runs bounded-concurrent. A 500-device name fan-out now completes with 0 connection resets — the manager issues exactly these name/cascade commands, so this is the fix that makes whole-fleet ops reliable. rc25 stops publishing mqtt_user/mqtt_password into the retained {root}/bridge/config (skip_serializing) and injects the bridge `version` into that payload. The manager exposes the raw bridge config to third-party plugins via ctx.bridge_config(), and can run an embedded bridge through this binding — so pinning rc25 guarantees the embedded path never writes credentials to the broker in the first place (the manager also redacts defensively in plugins.py for external/older bridges). The `version` field is surfaced in the UI's bridge-diagnostics panel.
    "tuyawizard>=0.1.9",  # 0.1.8 added close()/context manager to stop the per-call requests.Session leak (~750-950 KB/cycle); 0.1.9 then changed close()'s default so it no longer POSTs to `/v1.0/m/token/terminal/expire` — the previous default revoked the saved tokens server-side after every wizard run, forcing a fresh QR scan on the next call. Manager's wizard.close() is called with no args so it picks up the new revoke_terminal=False default automatically.
    "cryptography>=41",   # missing dep of tuya-sharing-sdk
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-playwright>=0.5",
    "httpx>=0.27",
    "ruff>=0.6",
]

[project.scripts]
rustuya-manager = "rustuya_manager.cli:main"

[tool.setuptools.dynamic]
version = { attr = "rustuya_manager.__version__" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
rustuya_manager = ["templates/*.html", "static/*.js", "static/*.css", "static/locales/*.json", "data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# e2e_ui boots uvicorn in a session-scoped daemon thread and drives the page
# via Playwright's sync API (greenlet bridge). Both leak event-loop state into
# the main thread, which then collides with pytest-asyncio's per-test Runner
# when async unit tests run in the same session. Default to excluding e2e here
# so a bare `pytest` is fast and conflict-free; CI runs `pytest -m e2e` in a
# separate step.
addopts = "-m 'not e2e'"
markers = [
    "e2e: browser-driven UI smoke tests (Playwright + uvicorn); run separately",
]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]
ignore = [
    "E501",  # formatter handles line length
    "B008",  # FastAPI Depends/Body in defaults
]

[tool.ruff.lint.isort]
known-first-party = ["rustuya_manager"]

[tool.ruff.format]
quote-style = "double"
