name: CI

# Runs on PRs targeting master and on direct pushes to master.
# The actual ruff + pytest matrix lives in _test.yml so the same checks
# also run as a pre-flight inside release.yml and docker-publish.yml.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight CI on the same ref when a new push lands — saves runner
# minutes during rapid PR iteration and matches the user's habit of
# repeated small commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  build:
    name: build wheel
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        # `pip wheel . --no-deps` produces a wheel without pulling in transitive
        # deps (those will be resolved at install time). Same artifact shape as
        # the local dev wheels in /tmp/manager-dist.
        run: |
          python -m pip install --upgrade pip
          mkdir -p dist
          pip wheel . --no-deps -w dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: rustuya-manager-wheel
          path: dist/*.whl
          retention-days: 30
